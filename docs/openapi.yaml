openapi: 3.1.0
info:
  title: VIVAC API
  description: 캠퍼를 위한 장소 큐레이션 서비스
  version: 0.1.0

servers:
  - url: http://localhost:8000
    description: 로컬 개발 서버
  - url: https://api.vivac.app
    description: 프로덕션 서버

tags:
  - name: health
    description: 헬스 체크
  - name: auth
    description: 인증 및 사용자 관리

paths:
  /health:
    get:
      tags:
        - health
      summary: 헬스 체크
      operationId: healthCheck
      responses:
        "200":
          description: 서버 정상 동작
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  environment:
                    type: string
                    enum: [local, dev, prod]
                    example: local

  /auth/google:
    post:
      tags:
        - auth
      summary: Google 로그인
      description: Google ID 토큰으로 로그인하고 JWT 토큰 쌍을 발급합니다.
      operationId: loginWithGoogle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleLoginRequest"
      responses:
        "200":
          description: 로그인 성공, JWT 토큰 쌍 반환
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: 유효하지 않은 Google ID 토큰
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                detail: Invalid Google ID token
        "403":
          description: 비활성화된 계정
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                detail: Inactive user

  /auth/refresh:
    post:
      tags:
        - auth
      summary: 토큰 갱신
      description: 리프레시 토큰으로 새 토큰 쌍을 발급합니다.
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: 토큰 갱신 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: 유효하지 않거나 만료된 리프레시 토큰
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_token:
                  summary: 유효하지 않거나 만료된 토큰
                  value:
                    detail: Invalid or expired refresh token
                invalid_token_type:
                  summary: 토큰 타입 오류
                  value:
                    detail: Invalid token type
                user_not_found:
                  summary: 사용자 없음
                  value:
                    detail: User not found
        "403":
          description: 비활성화된 계정
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                detail: Inactive user

  /auth/me:
    get:
      tags:
        - auth
      summary: 내 정보 조회
      description: 현재 로그인한 사용자 정보를 반환합니다.
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 사용자 정보 반환 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_token:
                  summary: 유효하지 않거나 만료된 토큰
                  value:
                    detail: Invalid or expired token
                invalid_token_type:
                  summary: 토큰 타입 오류
                  value:
                    detail: Invalid token type
                user_not_found:
                  summary: 사용자 없음
                  value:
                    detail: User not found
        "403":
          description: 비활성화된 계정
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                detail: Inactive user

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT 액세스 토큰을 사용합니다.
        - 알고리즘: HS256
        - 만료: 30분
        - 획득 경로: POST /auth/google 또는 POST /auth/refresh

  schemas:
    GoogleLoginRequest:
      type: object
      required:
        - id_token
      properties:
        id_token:
          type: string
          description: Google OAuth 2.0 ID 토큰
          example: eyJhbGciOiJSUzI1NiIsImtpZCI6...

    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: JWT 리프레시 토큰
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6...

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT 액세스 토큰 (유효기간 30분)
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6...
        refresh_token:
          type: string
          description: JWT 리프레시 토큰 (유효기간 7일)
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6...
        token_type:
          type: string
          description: 토큰 타입
          enum: [bearer]
          example: bearer

    UserResponse:
      type: object
      properties:
        id:
          type: integer
          description: 사용자 고유 ID
          example: 1
        email:
          type: string
          format: email
          description: 사용자 이메일 주소
          example: user@example.com
        name:
          type: string
          nullable: true
          description: 사용자 이름 (Google 프로필에서 가져옴)
          example: 홍길동
        picture:
          type: string
          format: uri
          nullable: true
          description: 프로필 이미지 URL
          example: https://lh3.googleusercontent.com/...
        is_active:
          type: boolean
          description: 계정 활성화 여부
          example: true
        created_at:
          type: string
          format: date-time
          description: 계정 생성 일시 (UTC)
          example: "2026-05-01T00:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: 계정 최종 수정 일시 (UTC)
          example: "2026-05-01T00:00:00Z"

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          description: 에러 메시지
          example: Invalid or expired token
